<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__COXETER_VIZ_TITLE__</title>
  <style>
    html, body { margin: 0; height: 100%; background: #ffffff; overflow: hidden; }
    #figure { width: 100%; height: 100%; }
    #problems {
      font: 13px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #a03030; padding: 20px; white-space: pre-wrap;
    }
    /* The export corner: invisible until the pointer visits the page. */
    #exports {
      position: fixed; right: 12px; top: 12px; display: flex; gap: 6px;
      opacity: 0; transition: opacity 0.2s;
    }
    body:hover #exports { opacity: 1; }
    #exports button {
      font: 12px system-ui, sans-serif; padding: 4px 10px; cursor: pointer;
      color: #444; background: rgba(255, 255, 255, 0.92);
      border: 1px solid #ccc; border-radius: 4px;
    }
    #exports button:hover { background: #f2f0ea; }
    /* The view switcher (bottom-left), hover-revealed like the exports. */
    #views {
      position: fixed; left: 12px; bottom: 12px; display: flex; gap: 6px; align-items: center;
      opacity: 0; transition: opacity 0.2s;
    }
    body:hover #views { opacity: 1; }
    #views button, #views select {
      font: 12px system-ui, sans-serif; padding: 4px 10px; cursor: pointer;
      color: #444; background: rgba(255, 255, 255, 0.92);
      border: 1px solid #ccc; border-radius: 4px;
    }
    #views button:hover { background: #f2f0ea; }
    #views button.active { background: #444; color: #fff; border-color: #444; }
    /* The input corner (top-left): the explorer's open fields. Always visible
       — it is the primary control — unlike the hover-revealed exports/views. */
    #inputs {
      position: fixed; left: 12px; top: 12px; display: flex; flex-direction: column; gap: 6px;
    }
    #inputs .field { display: flex; align-items: center; gap: 8px; }
    #inputs label {
      font: 12px system-ui, sans-serif; color: #555; min-width: 4.5em; text-align: right;
    }
    #inputs input {
      font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; padding: 4px 8px;
      width: 12em; color: #222; background: rgba(255, 255, 255, 0.92);
      border: 1px solid #ccc; border-radius: 4px;
    }
    #inputs input:focus { outline: none; border-color: #888; }
    #inputs .msg { font: 11px system-ui, sans-serif; color: #a03030; min-height: 14px; }
  </style>
</head>
<body>
  <div id="figure"></div>
  <div id="inputs"></div>
  <div id="exports" hidden>
    <button id="dl-svg" type="button">SVG</button>
    <button id="dl-png" type="button">PNG 4&times;</button>
  </div>
  <div id="views" hidden></div>
  <script>/*__COXETER_VIZ_BUNDLE__*/</script>
  <script>
    (function () {
      'use strict';
      var FIGURE = "__COXETER_VIZ_FIGURE__";
      var container = document.getElementById('figure');
      var exportsBox = document.getElementById('exports');
      var viewsBox = document.getElementById('views');
      var inputsBox = document.getElementById('inputs');
      var handle = null;

      // The document's OPEN fields (empty for an ordinary figure). Each becomes
      // a live input; `values` holds the current value per field id, and every
      // draw resolves the holes to a concrete document the engine renders.
      var inputs = coxeterViz.figureInputs(FIGURE);
      var values = {};

      // A field's value, parsed from its text box. Only 'polygon' today: a
      // comma/space-separated integer sequence. Bad text is a hint, not a draw.
      function parseField(kind, text) {
        var tokens = text.split(/[\s,]+/).filter(function (t) { return t.length; });
        if (!tokens.length) return { hint: 'enter a sequence, e.g. 2, 3, 7' };
        var nums = tokens.map(Number);
        if (nums.some(function (n) { return !Number.isInteger(n); })) {
          return { hint: 'integers separated by commas' };
        }
        return { value: nums };
      }

      function buildInputs() {
        inputsBox.textContent = '';
        inputs.forEach(function (field) {
          var start = Array.isArray(field.default) ? field.default.join(', ') : '';
          var row = document.createElement('div');
          row.className = 'field';
          var label = document.createElement('label');
          label.textContent = field.label;
          var input = document.createElement('input');
          input.type = 'text';
          input.value = start;
          input.spellcheck = false;
          input.setAttribute('aria-label', field.label);
          var msg = document.createElement('span');
          msg.className = 'msg';
          row.append(label, input, msg);
          inputsBox.appendChild(row);

          var seed = parseField(field.kind, start);
          if (seed.value) values[field.id] = seed.value;

          var timer;
          input.addEventListener('input', function () {
            clearTimeout(timer);
            timer = setTimeout(function () {
              var parsed = parseField(field.kind, input.value);
              if (parsed.value) {
                msg.textContent = '';
                values[field.id] = parsed.value;
                mount();
              } else {
                msg.textContent = parsed.hint;
              }
            }, 200);
          });
        });
      }

      // The view switcher: a toggle for 2 views, a dropdown for 3+, none for
      // 0/1. Switching calls handle.setView — the background and camera stay.
      function buildViewControl() {
        viewsBox.textContent = '';
        if (!handle || handle.views.length < 2) {
          viewsBox.hidden = true;
          return;
        }
        viewsBox.hidden = false;
        var names = handle.views;
        if (names.length === 2) {
          names.forEach(function (name, i) {
            var b = document.createElement('button');
            b.type = 'button';
            b.textContent = name;
            if (i === handle.activeView) b.className = 'active';
            b.addEventListener('click', function () {
              handle.setView(i);
              Array.prototype.forEach.call(viewsBox.children, function (c, j) {
                c.className = j === i ? 'active' : '';
              });
            });
            viewsBox.appendChild(b);
          });
        } else {
          var sel = document.createElement('select');
          names.forEach(function (name, i) {
            var o = document.createElement('option');
            o.value = String(i);
            o.textContent = name;
            if (i === handle.activeView) o.selected = true;
            sel.appendChild(o);
          });
          sel.addEventListener('change', function () { handle.setView(Number(sel.value)); });
          viewsBox.appendChild(sel);
        }
      }

      function showNotice(text) {
        var pre = document.createElement('pre');
        pre.id = 'problems';
        pre.textContent = text;
        container.appendChild(pre);
        exportsBox.hidden = true;
        viewsBox.hidden = true;
      }

      function mount() {
        if (handle) handle.dispose();
        handle = null;
        container.textContent = '';
        // An open field with no value yet (no default, nothing typed): prompt
        // for it rather than rendering a still-open document.
        var missing = inputs.filter(function (f) { return !(f.id in values); });
        if (missing.length) {
          showNotice('Enter a value for: ' + missing.map(function (f) { return f.label; }).join(', '));
          return;
        }
        var concrete = coxeterViz.resolveFigure(FIGURE, values);
        var result = coxeterViz.render(container, concrete);
        if (!result.ok) {
          var pre = document.createElement('pre');
          pre.id = 'problems';
          pre.textContent = result.problems
            .map(function (p) { return (p.path || '(document)') + '\n  ' + p.problem; })
            .join('\n\n');
          container.appendChild(pre);
          exportsBox.hidden = true;
          viewsBox.hidden = true;
          return;
        }
        handle = result.handle;
        exportsBox.hidden = false;
        buildViewControl();
      }
      buildInputs();
      mount();

      var resizeTimer;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(mount, 150);
      });

      var stem = (document.title || 'figure').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'figure';
      function download(name, blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 10000);
      }
      function viewSuffix() {
        if (!handle || handle.views.length < 2) return '';
        return '-' + handle.views[handle.activeView].replace(/[^a-z0-9]+/gi, '-');
      }
      document.getElementById('dl-svg').addEventListener('click', function () {
        if (handle) download(stem + viewSuffix() + '.svg', new Blob([handle.svg()], { type: 'image/svg+xml' }));
      });
      document.getElementById('dl-png').addEventListener('click', function () {
        if (handle) handle.png(4).then(function (blob) { download(stem + viewSuffix() + '@4x.png', blob); });
      });
    })();
  </script>
</body>
</html>
